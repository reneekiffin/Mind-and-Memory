<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
<title>40s Music – Mind & Memory</title>
<link rel="stylesheet" href="style.css">
<style>
  body { background: linear-gradient(160deg,#FFF8E0,#FFF8F0); overflow-y:auto; }

  .m4-banner {
    margin: 0 24px 14px; border-radius: 16px;
    padding: 14px 20px; font-size: 18px; font-weight: 800;
    text-align: center; color: #2C2C2C; background: var(--yellow);
    line-height: 1.3;
  }

  .m4-question {
    margin: 0 24px 14px; background: #fff;
    border: 3px solid #C9A100; border-radius: var(--radius);
    padding: 22px 18px; box-shadow: var(--shadow); text-align: center;
  }
  .m4-q-label {
    font-size: 13px; font-weight: 900; letter-spacing: 1px;
    color: #C9A100; text-transform: uppercase; margin-bottom: 8px;
  }
  .m4-q-text {
    font-family: 'Fredoka One', cursive; font-size: 24px;
    color: var(--text); line-height: 1.3;
  }
  .m4-play-btn {
    display: none;
    margin: 14px auto 0;
    background: var(--yellow); border: 3px solid #C9A100;
    border-radius: 50px; padding: 10px 22px;
    font-size: 16px; font-weight: 900; color: #2C2C2C;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .m4-play-btn:disabled { opacity: .55; cursor: default; }
  .m4-play-btn:not(:disabled):active { transform: scale(.97); }

  .m4-options {
    display: grid; grid-template-columns: 1fr;
    gap: 10px; padding: 0 24px;
  }
  .m4-btn {
    background: #fff; border: 3px solid var(--border);
    border-radius: 16px; padding: 14px 16px;
    font-size: 17px; font-weight: 800; color: var(--text);
    cursor: pointer; text-align: left;
    box-shadow: 0 3px 8px rgba(0,0,0,.08);
    -webkit-tap-highlight-color: transparent;
    line-height: 1.3;
  }
  .m4-btn:active { transform: scale(.97); }
  .m4-btn.correct { background: #C9A100; color: #fff; border-color: #C9A100; }
  .m4-btn.wrong   { background: #EF5350; color: #fff; border-color: #EF5350; }

  .m4-feedback {
    margin: 14px 24px 0; text-align: center;
    font-size: 18px; font-weight: 900; min-height: 26px;
  }
  .m4-feedback.good { color: var(--green); }
  .m4-feedback.bad  { color: #EF5350; }

  .m4-fact-box {
    margin: 12px 24px 18px; background: #FFF3D6;
    border: 3px solid #C9A100; border-radius: 16px;
    padding: 14px 18px; display: none;
  }
  .m4-fact-label { font-size: 13px; font-weight: 900; color: #C9A100; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
  .m4-fact-text  { font-size: 15px; font-weight: 700; color: var(--text); line-height: 1.4; }
</style>
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Mind &amp; Memory">
  <meta name="theme-color" content="#C9A100">
</head>
<body>

  <a class="back-btn" href="index.html">← Home</a>

  <div class="game-header">
    <div class="game-title" style="color:#C9A100">🎵 40s Music</div>
    <div class="score-badge">⭐ <span id="m4-score">0</span> · Q<span id="m4-qnum">1</span></div>
  </div>

  <div class="m4-banner">Match the song to the singer or band that made it famous!</div>

  <div class="m4-question">
    <div class="m4-q-label">Who recorded this song?</div>
    <div class="m4-q-text" id="m4-question"></div>
    <button class="m4-play-btn" id="m4-play" disabled>🔊 Play sample</button>
  </div>

  <div class="m4-options" id="m4-options"></div>

  <div class="m4-feedback" id="m4-feedback"></div>

  <div class="m4-fact-box" id="m4-fact-box">
    <div class="m4-fact-label">🎶 Did you know?</div>
    <div class="m4-fact-text" id="m4-fact-text"></div>
  </div>

  <script src="games/music40s.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/Mind-and-Memory/sw.js");
    }
  </script>
</body>
</html>
