<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Word Guess – Mind & Memory</title>
<link rel="stylesheet" href="style.css">
<style>
  /* Full-screen — keyboard always visible, nothing scrolls */
  html, body { height:100%; overflow:hidden; }
  body { background:linear-gradient(160deg,#E8F8F6,#FFF8F0); display:flex; flex-direction:column; }

  .wordle-top { flex-shrink:0; }
  .wordle-banner { margin:0 20px 6px; background:var(--teal); color:#fff; border-radius:14px; padding:10px 16px; font-size:17px; font-weight:800; text-align:center; }
  .wordle-legend { display:flex; gap:10px; justify-content:center; padding:0 16px 6px; }
  .legend-item { display:flex; align-items:center; gap:5px; font-size:14px; font-weight:800; }
  .legend-box { width:24px; height:24px; border-radius:5px; display:flex; align-items:center; justify-content:center; font-size:11px; color:#fff; font-weight:900; }
  .legend-box.green  { background:var(--green); }
  .legend-box.yellow { background:#C9960A; }
  .legend-box.gray   { background:#9E9E9E; }

  /* Grid fills remaining space */
  .wordle-grid-area { flex:1; display:flex; flex-direction:column; justify-content:center; gap:6px; padding:0 20px; min-height:0; }
  .wordle-row { display:grid; grid-template-columns:repeat(5,1fr); gap:6px; }
  .wordle-cell { aspect-ratio:1; border:3px solid var(--border); border-radius:10px; display:flex; align-items:center; justify-content:center; font-family:'Fredoka One',cursive; font-size:28px; background:#fff; color:var(--text); transition:background .25s,border-color .25s,color .25s; }
  .wordle-cell.active-row { border-color:var(--teal); }
  .wordle-cell.correct { background:var(--green); border-color:var(--green); color:#fff; }
  .wordle-cell.present { background:#C9960A;       border-color:#C9960A;      color:#fff; }
  .wordle-cell.absent  { background:#9E9E9E;        border-color:#9E9E9E;       color:#fff; }

  .wordle-feedback { flex-shrink:0; text-align:center; padding:3px 16px; font-size:18px; font-weight:900; min-height:30px; }
  .wordle-feedback.good { color:var(--green); }
  .wordle-feedback.bad  { color:#EF5350; }
  .wordle-feedback.hint { color:var(--teal); }

  /* Keyboard — always at bottom */
  .wordle-keyboard { flex-shrink:0; padding:4px 8px 12px; display:flex; flex-direction:column; gap:6px; }
  .kb-row { display:flex; gap:4px; justify-content:center; }
  .kb-key { flex:1; max-width:38px; height:50px; border-radius:9px; border:3px solid var(--border); background:#fff; font-family:'Fredoka One',cursive; font-size:19px; cursor:pointer; color:var(--text); display:flex; align-items:center; justify-content:center; box-shadow:0 2px 5px rgba(0,0,0,0.10); -webkit-tap-highlight-color:transparent; user-select:none; }
  .kb-key:active { transform:scale(.90); }
  .kb-key.wide   { max-width:54px; font-size:13px; flex:1.45; }
  .kb-key.correct { background:var(--green); border-color:var(--green); color:#fff; }
  .kb-key.present { background:#C9960A;       border-color:#C9960A;      color:#fff; }
  .kb-key.absent  { background:#BDBDBD;       border-color:#BDBDBD;      color:#fff; }
</style>
</head>
<body>
  <div class="wordle-top">
    <a class="back-btn" href="index.html">← Home</a>
    <div class="game-header">
      <div class="game-title" style="color:var(--teal)">💬 Word Guess</div>
      <div class="score-badge">Try <span id="wordle-try">1</span>/6</div>
    </div>
    <div class="wordle-banner">Guess the 5-letter word! You have 6 tries 😊</div>
    <div class="wordle-legend">
      <div class="legend-item"><div class="legend-box green">A</div> Right spot!</div>
      <div class="legend-item"><div class="legend-box yellow">B</div> Wrong spot</div>
      <div class="legend-item"><div class="legend-box gray">C</div> Not in word</div>
    </div>
  </div>

  <div class="wordle-grid-area" id="wordle-grid"></div>
  <div class="wordle-feedback" id="wordle-feedback"></div>
  <div class="wordle-keyboard" id="wordle-keyboard"></div>

  <div class="overlay" id="result-overlay">
    <div class="result-popup">
      <div class="result-emoji" id="res-emoji">🎉</div>
      <div class="result-title" id="res-title">Well Done!</div>
      <div class="result-score" id="res-score"></div>
      <button class="popup-btn" id="res-play-again">Play Again 🔄</button>
      <a class="popup-btn secondary" href="index.html">← Back to Home</a>
    </div>
  </div>

  <script src="games/wordle.js"></script>
</body>
</html>
