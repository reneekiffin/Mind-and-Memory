<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
<title>Word Guess – Mind & Memory</title>
<link rel="stylesheet" href="style.css">
<style>
  html, body {
    height: 100%;
    overflow: hidden;
    background: linear-gradient(160deg, #E8F8F6, #FFF8F0);
  }
  body {
    display: flex;
    flex-direction: column;
    padding-bottom: max(env(safe-area-inset-bottom), 12px);
  }

  /* ── TOP: back + header + banner + legend — all compact ── */
  .wordle-top { flex-shrink: 0; }

  .back-btn  { margin: 8px 14px 0; padding: 9px 16px; font-size: 16px; }
  .game-header { padding: 5px 14px 3px; }
  .game-title  { font-size: 21px; }
  .score-badge { font-size: 15px; padding: 6px 13px; }

  .wordle-banner {
    margin: 3px 14px 3px;
    background: #007A6E; /* darker teal = better contrast */
    color: #fff;
    border-radius: 10px; padding: 7px 12px;
    font-size: 14px; font-weight: 900; text-align: center;
  }

  .wordle-legend {
    display: flex; gap: 10px; justify-content: center;
    padding: 2px 14px 3px;
  }
  .legend-item { display: flex; align-items: center; gap: 4px; font-size: 13px; font-weight: 900; }
  .legend-box  {
    width: 22px; height: 22px; border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; color: #fff; font-weight: 900;
  }
  .legend-box.green  { background: #1A7A4A; } /* dark green */
  .legend-box.yellow { background: #8A6000; } /* dark gold */
  .legend-box.gray   { background: #555;    } /* dark gray */

  /* ── GRID — fixed height rows, never overlaps keyboard ── */
  #wordle-grid {
    flex-shrink: 0;         /* does NOT grow — fixed size */
    display: flex;
    flex-direction: column;
    gap: 5px;
    padding: 4px 16px 4px;
  }
  .wordle-row {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 5px;
    height: 54px;           /* fixed row height */
  }
  .wordle-cell {
    border: 3px solid #B0B0B0;
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Fredoka One', cursive;
    font-size: 28px; font-weight: 900;
    background: #fff; color: #111;
    transition: background .25s, border-color .25s, color .25s;
  }
  .wordle-cell.active-row { border-color: #007A6E; border-width: 3px; }

  /* HIGH CONTRAST colour states */
  .wordle-cell.correct {
    background: #1A7A4A;  /* dark green */
    border-color: #1A7A4A;
    color: #fff;
  }
  .wordle-cell.present {
    background: #8A6000;  /* dark gold/amber */
    border-color: #8A6000;
    color: #fff;
  }
  .wordle-cell.absent {
    background: #444;     /* very dark gray */
    border-color: #444;
    color: #fff;
  }

  /* ── FEEDBACK ── */
  #wordle-feedback {
    flex-shrink: 0;
    text-align: center; padding: 2px 14px;
    font-size: 16px; font-weight: 900; min-height: 26px;
  }
  #wordle-feedback.good { color: #1A7A4A; }
  #wordle-feedback.bad  { color: #C0180C; }
  #wordle-feedback.hint { color: #007A6E; }

  /* spacer pushes keyboard to bottom */
  .wordle-spacer { flex: 1; min-height: 4px; }

  /* ── KEYBOARD — big keys, always visible at bottom ── */
  #wordle-keyboard {
    flex-shrink: 0;
    padding: 4px 4px 6px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .kb-row {
    display: flex; gap: 5px;
    justify-content: center;
  }
  .kb-key {
    flex: 1;
    height: 56px;
    max-width: 40px;
    border-radius: 10px;
    border: 2px solid #B8B0A8;
    background: #fff;
    font-family: 'Fredoka One', cursive;
    font-size: 21px;
    cursor: pointer;
    color: #111;             /* very dark for contrast */
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 3px 0 #999; /* 3D raised look */
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    font-weight: 900;
  }
  .kb-key:active {
    transform: translateY(2px);
    box-shadow: 0 1px 0 #999;
  }
  .kb-key.wide      { max-width: 56px; flex: 1.4; font-size: 14px; }
  .kb-key.enter-key { background: #E0F4EC; border-color: #1A7A4A; color: #1A7A4A; box-shadow: 0 3px 0 #0e5232; font-size: 13px; }
  .kb-key.delete-key{ background: #FDE8E4; border-color: #C0180C; color: #C0180C; box-shadow: 0 3px 0 #8a1008; font-size: 19px; }

  /* keyboard colour states — HIGH CONTRAST */
  .kb-key.correct {
    background: #1A7A4A; border-color: #1A7A4A;
    box-shadow: 0 3px 0 #0e5232; color: #fff;
  }
  .kb-key.present {
    background: #8A6000; border-color: #8A6000;
    box-shadow: 0 3px 0 #5a3e00; color: #fff;
  }
  .kb-key.absent {
    background: #555; border-color: #555;
    box-shadow: 0 3px 0 #333; color: #fff;
  }
</style>
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Mind &amp; Memory">
  <meta name="theme-color" content="#E8633A">
</head>
<body>

  <div class="wordle-top">
    <a class="back-btn" href="index.html">← Home</a>
    <div class="game-header">
      <div class="game-title" style="color:#007A6E">💬 Word Guess</div>
      <div class="score-badge">Try <span id="wordle-try">1</span>/6</div>
    </div>
    <div class="wordle-banner">Guess the 5-letter word! You have 6 tries 😊</div>
    <div class="wordle-legend">
      <div class="legend-item"><div class="legend-box green">A</div> Right spot!</div>
      <div class="legend-item"><div class="legend-box yellow">B</div> Wrong spot</div>
      <div class="legend-item"><div class="legend-box gray">C</div> Not in word</div>
    </div>
  </div>

  <!-- 6-row grid — fixed height, never overlaps keyboard -->
  <div id="wordle-grid"></div>

  <div id="wordle-feedback"></div>

  <!-- pushes keyboard down but lets grid stay fixed -->
  <div class="wordle-spacer"></div>

  <!-- keyboard always at bottom -->
  <div id="wordle-keyboard"></div>

  <div class="overlay" id="result-overlay">
    <div class="result-popup">
      <div class="result-emoji" id="res-emoji">🎉</div>
      <div class="result-title" id="res-title">Well Done!</div>
      <div class="result-score" id="res-score"></div>
      <button class="popup-btn" id="res-play-again">Play Again 🔄</button>
      <a class="popup-btn secondary" href="index.html">← Back to Home</a>
    </div>
  </div>

  <script src="games/wordle.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/Mind-and-Memory/sw.js");
    }
  </script>
</body>
</html>
