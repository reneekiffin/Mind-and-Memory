<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
<title>Sudoku – Mind & Memory</title>
<link rel="stylesheet" href="style.css">
<style>
  body { background: linear-gradient(160deg,#FFF5E8,#FFF8F0); overflow-y:auto; }

  /* ── Top controls ── */
  .sudoku-controls {
    display: flex; gap: 8px; padding: 0 24px 12px;
    align-items: center;
  }
  .sudoku-level-pill {
    flex: 1; padding: 10px 0; border-radius: 50px;
    font-size: 16px; font-weight: 900; cursor: pointer;
    border: 3px solid #C0550D; color: #C0550D;
    background: #FFF3EE; -webkit-tap-highlight-color: transparent;
    text-align: center;
  }
  .sudoku-level-pill.active { background: #C0550D; color: #fff; }

  /* ── Header right cluster (timer + save tag) ── */
  .sudoku-header-right {
    display: flex; align-items: center; gap: 8px;
  }
  .sudoku-save-tag {
    font-size: 13px; font-weight: 800; white-space: nowrap;
    color: var(--green); background: #E8F8EF;
    padding: 6px 12px; border-radius: 50px;
  }

  /* ── Status line ── */
  .sudoku-status {
    text-align: center; padding: 4px 24px 8px;
    font-size: 16px; font-weight: 800; color: var(--teal); min-height: 24px;
  }

  /* ── Pencil toggle ── */
  .pencil-toggle-wrap { text-align: center; padding: 0 24px 10px; }
  #pencil-toggle {
    display: inline-block; width: auto;
    background: #fff; border: 2px solid var(--purple);
    border-radius: 50px; padding: 6px 16px;
    font-size: 14px; font-weight: 800; color: var(--purple);
    cursor: pointer; text-align: center;
    -webkit-tap-highlight-color: transparent;
    transition: background .2s, color .2s;
    line-height: 1.2;
  }

  /* ── Board ── */
  .sudoku-board-wrap {
    padding: 0 10px 12px; display: flex; justify-content: center;
  }
  .sudoku-board {
    display: grid; grid-template-columns: repeat(9, 1fr);
    border: 3px solid #333; border-radius: 10px; overflow: hidden;
    width: 100%; max-width: 390px;
  }
  .sudoku-cell {
    aspect-ratio: 1;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Fredoka One', cursive; font-size: 20px;
    background: #fff; color: var(--text); cursor: pointer;
    border-right: 1px solid #ddd; border-bottom: 1px solid #ddd;
    position: relative; transition: background .12s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  /* cell states */
  .sudoku-cell.given       { background: #F0EBE3; color: #111; font-weight: 900; cursor: default; }
  .sudoku-cell.selected    { background: #A8D8F0 !important; }
  .sudoku-cell.highlight   { background: #E0F2FB; }
  .sudoku-cell.same-num    { background: #C8EADA; }
  .sudoku-cell.error       { color: #D32F2F; }
  .sudoku-cell.correct-fill{ color: #1A7A52; }

  /* ── Pencil marks mini-grid ── */
  .pencil-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    width: 100%; height: 100%; padding: 1px;
  }
  .pencil-num {
    display: flex; align-items: center; justify-content: center;
    font-family: 'Nunito', sans-serif;
    font-size: 8px; font-weight: 900;
    color: #7B3FC4; line-height: 1;
  }

  /* ── Number pad ── */
  .sudoku-numpad {
    display: grid; grid-template-columns: repeat(5, 1fr);
    gap: 9px; padding: 0 24px 12px;
  }
  .sudoku-num {
    background: #fff; border: 3px solid #C0550D;
    border-radius: 16px; padding: 14px 6px;
    font-family: 'Fredoka One', cursive; font-size: 30px;
    cursor: pointer; text-align: center; color: #C0550D;
    box-shadow: 0 3px 8px rgba(0,0,0,.1);
    -webkit-tap-highlight-color: transparent;
    user-select: none; line-height: 1;
  }
  .sudoku-num:active { transform: scale(.92); }
  .sudoku-num.erase {
    grid-column: span 2;
    background: #C0550D; color: #fff;
    font-size: 20px; border-color: #C0550D;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 2px;
  }

  /* ── Hint button ── */
  .sudoku-hint-btn {
    display: block; margin: 0 24px 20px;
    background: #fff; border: 3px solid var(--purple);
    border-radius: 50px; padding: 14px 20px;
    font-size: 18px; font-weight: 800; color: var(--purple);
    cursor: pointer; text-align: center;
    -webkit-tap-highlight-color: transparent;
  }
  .sudoku-hint-btn:active { transform: scale(.97); }
</style>
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Mind &amp; Memory">
  <meta name="theme-color" content="#E8633A">
</head>
<body>

  <a class="back-btn" href="index.html">← Home</a>

  <div class="game-header">
    <div class="game-title" style="color:#C0550D">🧩 Sudoku</div>
    <div class="sudoku-header-right">
      <span class="sudoku-save-tag" id="sudoku-save-tag">💾 Saved</span>
      <div class="score-badge" id="sudoku-timer">⏱ 0:00</div>
    </div>
  </div>

  <!-- Level selector -->
  <div class="sudoku-controls">
    <span class="sudoku-level-pill active" data-lvl="easy"   onclick="setSudokuLevel('easy')">Easy</span>
    <span class="sudoku-level-pill"        data-lvl="medium" onclick="setSudokuLevel('medium')">Medium</span>
    <span class="sudoku-level-pill"        data-lvl="hard"   onclick="setSudokuLevel('hard')">Hard</span>
  </div>

  <!-- Status -->
  <div class="sudoku-status" id="sudoku-status">Tap a cell, then tap a number</div>

  <!-- ✏️ Pencil mode toggle -->
  <div class="pencil-toggle-wrap">
    <button id="pencil-toggle" onclick="togglePencil()">
      ✏️ Pencil: <strong>OFF</strong>
    </button>
  </div>

  <!-- Board -->
  <div class="sudoku-board-wrap">
    <div class="sudoku-board" id="sudoku-board"></div>
  </div>

  <!-- Number pad -->
  <div class="sudoku-numpad" id="sudoku-numpad"></div>

  <!-- Hint -->
  <button class="sudoku-hint-btn" onclick="sudokuHint()">
    💡 Give me a hint — fill in one cell for me
  </button>

  <!-- Win popup -->
  <div class="overlay" id="result-overlay">
    <div class="result-popup">
      <div class="result-emoji" id="res-emoji">🏆</div>
      <div class="result-title" id="res-title">Puzzle Complete!</div>
      <div class="result-score" id="res-score"></div>
      <button class="popup-btn" id="res-play-again">New Puzzle 🔄</button>
      <a class="popup-btn secondary" href="index.html">← Back to Home</a>
    </div>
  </div>

  <script src="games/sudoku.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/Mind-and-Memory/sw.js");
    }
  </script>
</body>
</html>
