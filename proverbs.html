<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
<title>Jamaican Proverbs – Mind & Memory</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mind &amp; Memory">
<meta name="theme-color" content="#E8633A">
<style>
  body {
    background: #FFFBF0;
    overflow-y: auto;
  }

  /* ── Header — compact ── */
  .prov-header {
    background: linear-gradient(135deg, #006400 0%, #228B22 60%, #DAA520 100%);
    margin: 0 20px 12px;
    border-radius: 16px;
    padding: 10px 16px;
    display: flex; align-items: center; gap: 10px;
    box-shadow: var(--shadow);
  }
  .prov-header .flag { font-size: 28px; flex-shrink: 0; }
  .prov-header h2 {
    font-family: 'Fredoka One', cursive;
    font-size: 20px; color: #fff;
    text-shadow: 0 1px 3px rgba(0,0,0,0.3);
    margin-bottom: 0;
  }
  .prov-header p {
    font-size: 12px; color: rgba(255,255,255,0.85);
    font-weight: 700;
  }

  /* ── Score row ── */
  .prov-score-row {
    display: flex; justify-content: space-between;
    align-items: center; padding: 0 20px 12px;
  }
  .prov-score-badge {
    background: var(--yellow); border-radius: 50px;
    padding: 8px 18px; font-size: 18px; font-weight: 900;
  }
  .prov-q-badge {
    background: #fff; border: 3px solid var(--border);
    border-radius: 50px; padding: 8px 18px;
    font-size: 18px; font-weight: 900; color: var(--subtext);
  }

  /* ── Mode toggle — two big clear buttons ── */
  .prov-mode-row {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px; padding: 0 20px 14px;
  }
  .prov-mode-btn {
    padding: 11px 10px;
    border-radius: 14px;
    font-family: 'Fredoka One', cursive;
    font-size: 17px;
    cursor: pointer;
    text-align: center;
    border: 3px solid #006400;
    -webkit-tap-highlight-color: transparent;
    transition: all 0.15s;
  }
  /* OFF state — white bg, dark green text */
  .prov-mode-btn.off {
    background: #fff;
    color: #006400;
  }
  /* ON state — solid green, white text */
  .prov-mode-btn.on {
    background: #006400;
    color: #fff;
    box-shadow: 0 4px 0 #003D00;
  }
  .prov-mode-btn:active { transform: scale(0.96); }

  /* ── Proverb display box ── */
  .prov-box {
    margin: 0 20px 14px;
    background: #fff;
    border-radius: 20px;
    padding: 20px 20px;
    text-align: center;
    box-shadow: var(--shadow);
    border: 3px solid #DAA520;
    min-height: 110px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .prov-box-label {
    font-size: 13px; color: var(--subtext);
    font-weight: 900; margin-bottom: 8px;
    text-transform: uppercase; letter-spacing: 1px;
  }
  .prov-box-text {
    font-family: 'Fredoka One', cursive;
    font-size: 22px; color: #006400;
    line-height: 1.4;
  }

  /* ── Meaning reveal ── */
  .prov-meaning-box {
    margin: 0 20px 12px;
    background: #F0FFF4;
    border-radius: 16px;
    padding: 14px 18px;
    border: 3px solid #006400;
  }
  .prov-meaning-text {
    font-size: 17px; font-weight: 800;
    color: #004A00; line-height: 1.5;
    text-align: center;
  }

  /* ── Answer options ── */
  /* Complete mode — 2 columns */
  .prov-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px; padding: 0 20px;
  }
  /* Meaning mode — 1 column (text is longer) */
  .prov-options.meaning-mode {
    grid-template-columns: 1fr;
  }
  .prov-btn {
    background: #fff;
    border: 3px solid #D0C8C0;
    border-radius: 16px;
    padding: 18px 12px;
    font-family: 'Nunito', sans-serif;
    font-size: 20px;
    font-weight: 900;
    cursor: pointer;
    text-align: center;
    box-shadow: 0 3px 0 #B8B0A8;
    -webkit-tap-highlight-color: transparent;
    color: #111;
    line-height: 1.3;
    transition: transform 0.1s;
  }
  .prov-btn:active { transform: scale(0.96); box-shadow: 0 1px 0 #B8B0A8; }
  .prov-btn.correct {
    background: #006400; border-color: #006400;
    color: #fff; box-shadow: 0 3px 0 #003D00;
  }
  .prov-btn.wrong {
    background: #C0180C; border-color: #C0180C;
    color: #fff; box-shadow: 0 3px 0 #8A0A06;
  }

  /* ── Feedback ── */
  .prov-feedback {
    text-align: center; padding: 10px 20px 6px;
    font-size: 22px; font-weight: 900; min-height: 48px;
  }
  .prov-feedback.good { color: #006400; }
  .prov-feedback.bad  { color: #C0180C; }
</style>
</head>
<body>

  <a class="back-btn" href="index.html">← Home</a>

  <!-- Score row -->
  <div class="prov-score-row">
    <div class="prov-score-badge">⭐ <span id="prov-score">0</span></div>
    <div class="prov-q-badge">Q <span id="prov-qnum">1</span></div>
  </div>

  <!-- Jamaica header — compact horizontal -->
  <div class="prov-header">
    <div class="flag">🇯🇲</div>
    <div>
      <h2>Jamaican Proverbs</h2>
      <p>Wi likkle but wi tallawah!</p>
    </div>
  </div>

  <!-- Mode toggle — simple, clear -->
  <div class="prov-mode-row">
    <button class="prov-mode-btn on" id="mode-complete" onclick="setProvMode('complete')">
      ✏️ Complete It
    </button>
    <button class="prov-mode-btn off" id="mode-meaning" onclick="setProvMode('meaning')">
      🤔 What's It Mean?
    </button>
  </div>

  <!-- Proverb display -->
  <div class="prov-box">
    <div class="prov-box-label">The Proverb</div>
    <div class="prov-box-text" id="prov-proverb"></div>
  </div>

  <!-- Meaning reveal (shown after answering) -->
  <div class="prov-meaning-box" id="prov-meaning-box" style="display:none">
    <div class="prov-meaning-text" id="prov-meaning-text"></div>
  </div>

  <!-- Answer options -->
  <div class="prov-options" id="prov-options"></div>

  <!-- Feedback -->
  <div class="prov-feedback" id="prov-feedback"></div>

  <script src="games/proverbs.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/Mind-and-Memory/sw.js");
    }
  </script>
</body>
</html>
